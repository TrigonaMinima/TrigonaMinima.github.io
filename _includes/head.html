<head>
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light dark">
    <!-- anti-FOUC: set theme before stylesheet renders -->
    <script>(function(){try{var t=localStorage.getItem('theme')||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}}());</script>
    <!-- <meta http-equiv="Content-Security-Policy" content="img-src 'self'; child-src 'none';"> -->

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncatewords:75 }}" />

    <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ " /css/main.css" | prepend: site.baseurl }}">
    {% if page.content contains 'gallery-popup' or page.content contains 'single-image-popup' %}
    <link rel="stylesheet" href="https://unpkg.com/photoswipe@5.4.4/dist/photoswipe.css">
    <link rel="stylesheet" href="{{ '/css/gallery.css' | relative_url }}">
    {% endif %}
    {% if page.is_404 %}
    <link rel="stylesheet" href="{{ '/css/homer.css' | relative_url }}">
    {% endif %}
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Alice&family=Arvo&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Alice&family=Arvo&display=swap"
            rel="stylesheet">
    </noscript>
    {% unless page.is_404 %}
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML"> </script>
    {% endunless %}
</head>
